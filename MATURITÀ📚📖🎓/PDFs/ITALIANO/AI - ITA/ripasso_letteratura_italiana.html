{t:'Superomismo (D\'Annunzio)',d:'Da Nietzsche: forgiare una propria morale da imporre agli altri. D\'Annunzio si vede come guida delle masse pur snobbarle. Si contrappone al "gregge" borghese.'},
{t:'Il fanciullino (Pascoli)',d:'Dentro ogni uomo c\'è una parte bambinesca. Solo il poeta riesce a dargli voce, vedendo ogni cosa con stupore, usando intuizione e fantasia invece della razionalità.'},
{t:'Scapigliatura',d:'Corrente italiana post-Risorgimento (1861+). Delusione per la borghesia materialista. Vita bohémien. Manifesto: Preludio di Emilio Praga (1864).'},
],
flashcards:[
{f:'"I fiori del male" — struttura e contenuto',b:'Raccolta di Baudelaire (1857). Titolo ossimoro: bellezza + degrado. Contiene: Corrispondenze (manifesto Simbolismo) + 4 poesie sullo spleen (vuoto paralizzante per la vita).'},
{f:'Chi sono i "poeti maledetti"?',b:'Rimbaud, Mallarmé, Corbière. Definiti da Paul Verlaine (1884). Geni emarginati dalla borghesia; vita bohémien; alcol e droghe per "vedere" (veggenza).'},
{f:'Jean des Esseintes (À rebours)',b:'Ultimo erede di nobile famiglia. Nevrotico e disgustato dalla modernità. Si chiude in villa, inverte ciclo sonno-veglia, usa profumi e arte bizzarra. Alla fine distrugge il sistema nervoso: il medico lo obbliga a tornare alla vita normale.'},
{f:'Come finisce Dorian Gray?',b:'Tenta di distruggere il quadro (unica testimonianza dei suoi crimini). Pugnala la tela con lo stesso coltello con cui aveva ucciso il pittore Basil. Muore: trovato vecchio e deforme, riconoscibile solo dagli anelli alle dita.'},
{f:'Andrea Sperelli (Il Piacere)',b:'Alter ego di D\'Annunzio. Diviso tra Elena Muti (passione, lo lascia per un ricco inglese) e Maria Ferres (angelo). Al primo rapporto intimo chiama Maria col nome di Elena → lei capisce e lo abbandona. Torna solo da dove era partito.'},
{f:'Trittico pascoliano: Temporale, Il lampo, Il tuono',b:'Temporale: nuvole nere, casolare bianco come ala di gabbiano. Il lampo: notte, casolare come occhio terrorizzato dai lampi. Il tuono: tempesta lontana, nel casolare canto di madre e culla. Analogia al trauma del padre assassinato.'},
],

{id:'u4',roman:'IV',tab:'Novecento',title:'La Narrativa del Primo Novecento',period:"Inizio '900",color:'#185FA5',bg:'#E6F1FB',
intro:'Svevo indaga l\'inettitudine con la psicoanalisi. Pirandello frantuma l\'identità con il relativismo conoscitivo e il metateatro.',
authors:[

{name:'Luigi Pirandello',ctx:'Modernismo e teatro (1867–1936, Agrigento)',ideas:['Vita = flusso continuo in trasformazione. Forma = ruolo fisso che soffoca l\'individuo','Relativismo conoscitivo: ognuno ha la propria visione soggettiva della realtà','Comico = avvertimento del contrario. Umorismo = sentimento del contrario (+ compassione)','Metateatro: il teatro dentro il teatro','Trauma: moglie Maria Antonietta impazzisce dopo disastro della zolfara (1903)'],works:'L\'umorismo (1908); Il fu Mattia Pascal (1904); Così è (se vi pare) (1917); Uno, nessuno e centomila (1926)'},
],
concepts:[
{t:'Inettitudine (Svevo)',d:'Inabilità di agire. Il protagonista vive in uno stato di insoddisfazione e auto-giustificazione perenne, sognando imprese che non realizzerà mai. Nei primi romanzi = sconfitta. Poi = capacità di adattamento superiore ai "sani".'},
{t:'Narratore inattendibile',d:'Tecnica di Svevo: il lettore non può fidarsi del narratore. In La coscienza di Zeno: Zeno è un paziente bugiardo, il Dottor S è un medico vendicativo. Entrambi inaffidabili.'},
{t:'Vita / Forma (Pirandello)',d:'Vita = flusso continuo in trasformazione. Forma = il ruolo fisso (lavoro, famiglia) che congela il flusso e soffoca l\'individuo. Si fugge solo tramite l\'immaginazione o la follia.'},
{t:'Comico vs Umorismo (Pirandello)',d:'Comico = "avvertimento del contrario" (si ride subito). Umorismo = "sentimento del contrario" (poi si prova compassione). Esempio: la vecchia signora truccata → prima ridi, poi capisci e rimani con un sorriso amaro.'},
{t:'Metateatro',d:'Il teatro dentro il teatro: la finzione e la realtà si mescolano. Pirandello lo usa per destabilizzare le certezze del pubblico. Es. Sei personaggi in cerca di autore.'},
{t:'I 6 capitoli de La coscienza di Zeno',d:'1. Il fumo (US = Ultima Sigaretta). 2. La morte di mio padre (schiaffo). 3. La moglie e l\'amante (Ada → Augusta). 4. Storia del mio matrimonio (Carla Greco). 5. Associazione commerciale (Guido muore per errore). 6. Psico-analisi (guerra, si dichiara "guarito").'},
],
flashcards:[
{f:'Alfonso Nitti (Una vita)',b:'Impiegato bancario che sogna di fare lo scrittore. Ama Annetta Maller ma scappa dal matrimonio (inettitudine). Annetta sposa Macario. Nitti si suicida anziché affrontare il duello col fratello di lei.'},
{f:'Emilio Brentani (Senilità)',b:'Piccola fama letteraria. Relazione con Angiolina (infedele e bugiarda) di cui si ossessiona invece di lasciarla. Sorella Amalia muore per l\'etere a causa del suo allontanare Balli. Alla fine fonde le due donne in un ricordo inventato.'},
{f:'I 6 capitoli de La coscienza di Zeno',b:'1. Il fumo (Ultima Sigaretta). 2. La morte di mio padre (schiaffo sul letto di morte). 3. La moglie e l\'amante (Ada → Augusta). 4. Storia del mio matrimonio (Carla Greco). 5. Associazione commerciale (Guido muore per sbaglio). 6. Psico-analisi.'},
{f:'Così è (se vi pare) — le due versioni',b:'Ponza: Frola è pazza, crede che la seconda moglie sia sua figlia morta. Frola: Ponza è pazzo, hanno dovuto fingere un secondo matrimonio. Gli archivi sono distrutti: nessuna verità assoluta. La donna: "Io sono colei che mi si crede."'},
{f:'Mattia Pascal — trama sintetica',b:'Bibliotecario infelice. Fugge a Montecarlo, vince alla roulette, apprende la propria "morte" sul giornale. Diventa Adriano Meis a Roma, si innamora di Adriana. Non può sposarla (è "morto" per lo Stato). Finge un secondo suicidio. Torna a Miragno: la moglie ha risposato l\'amico Pomino. Finisce nella vecchia biblioteca come "Il fu Mattia Pascal".'},
{f:'Vitangelo Moscarda (Uno, nessuno e centomila)',b:'La moglie gli fa notare che il naso pende verso destra → crollo della sua identità. Capisce di esistere in centomila versioni negli occhi degli altri. Si comporta in modo folle, usa il patrimonio per fondare un ospizio dove va a vivere: finalmente privo di forma.'},
],
quiz:[
{q:'Cos\'è l\'"inettitudine" in Svevo?',opts:['L\'incapacità di scrivere romanzi','L\'inabilità di agire, vivere in insoddisfazione e auto-giustificazione perenne','La dipendenza da alcol dei protagonisti','Il fallimento economico dei personaggi'],a:1},
{q:'Cosa significa "US" nei diari di Zeno?',opts:['United States','Ultima Sigaretta (promessa sempre rinviata)','Un simbolo freudiano','Il nome dell\'analista'],a:1},

{q:'Come finisce Mattia Pascal?',opts:['Emigra in America','Si risposa con Romilda','Torna a Miragno e si ritira nella biblioteca come "Il fu Mattia Pascal"','Si suicida nel Po'],a:2},
{q:'Cosa risponde la donna misteriosa in "Così è (se vi pare)"?',opts:['"Sono la moglie di Ponza"','"Sono la figlia di Frola"','"Per me, io sono nessuna. Sono colei che mi si crede."','"La verità non esiste"'],a:2},
{q:'Perché Zeno si accoda al corteo funebre di uno sconosciuto? (cap. 5)',opts:['Si confonde per caso','È un lapsus freudiano che rivela il suo odio subconscio per Guido','Non sapeva dove si teneva il funerale','Vuole evitare Ada'],a:1},
{q:'Cosa causa il trauma di Pirandello legato alla moglie?',opts:['La Prima Guerra Mondiale','Il disastro della zolfara (1903) che distrugge il patrimonio','La perdita di un figlio','Una relazione extraconiugale'],a:1},
{q:'Cosa fa notare Dida a Moscarda (Uno, nessuno...)?',opts:['Che ha perso tutti i soldi','Che il naso pende verso destra','Che ha un alter ego nascosto','Che nessuno lo rispetta in banca'],a:1},

let state={udaIdx:0,mode:'studio',openAuthor:null,cardIdx:0,flipped:false,quizIdx:0,selected:null,answered:false,score:0,done:false};

function setState(updates){Object.assign(state,updates);render();}

function render(){
  const u=UDAS[state.udaIdx];
  const c=u.color;
  const R=document.getElementById('root');
  R.innerHTML='';

  const header=el('div',{class:'header'});
  header.appendChild(el('div',{class:'app-title',text:'Ripasso — Letteratura Italiana'}));
  const tabs=el('div',{class:'tabs'});
  UDAS.forEach((ud,i)=>{
    const t=el('button',{class:'tab'+(state.udaIdx===i?' active':''),text:ud.roman+'. '+ud.tab});
    if(state.udaIdx===i)t.style.background=ud.color;
    t.onclick=()=>setState({udaIdx:i,mode:state.mode,openAuthor:null,cardIdx:0,flipped:false,quizIdx:0,selected:null,answered:false,score:0,done:false});
    tabs.appendChild(t);
  });
  header.appendChild(tabs);
  R.appendChild(header);

  const mbar=el('div',{class:'modebar'});
  [['studio','Studio'],['flashcard','Flashcard'],['quiz','Quiz']].forEach(([m,label])=>{
    const b=el('button',{class:'mbtn'+(state.mode===m?' active':''),text:label});
    b.onclick=()=>setState({mode:m,openAuthor:null,cardIdx:0,flipped:false,quizIdx:0,selected:null,answered:false,score:0,done:false});
    mbar.appendChild(b);
  });
  R.appendChild(mbar);

  const content=el('div',{class:'content'});
  if(state.mode==='studio') renderStudio(u,content,c);
  else if(state.mode==='flashcard') renderFlashcard(u,content,c);
  else renderQuiz(u,content,c);
  R.appendChild(content);
}

function renderStudio(u,content,c){
  const intro=el('div',{class:'intro-card'});
  const pLabel=el('div',{class:'period-label',text:u.period});
  pLabel.style.color=c;
  intro.appendChild(pLabel);
  intro.appendChild(el('div',{class:'intro-title',text:u.roman+'. '+u.title}));
  intro.appendChild(el('div',{class:'intro-text',text:u.intro}));
  content.appendChild(intro);

  if(u.authors.length>0){
    content.appendChild(el('div',{class:'section-label',text:'Autori'}));
    u.authors.forEach((a,i)=>{
      const card=el('div',{class:'author-card'});
      card.style.borderLeftWidth='3px';
      card.style.borderLeftColor=c+'80';
      const hdr=el('div',{class:'author-header'});
      hdr.onclick=()=>setState({...state,openAuthor:state.openAuthor===i?null:i});
      const hLeft=el('div',{});
      hLeft.appendChild(el('div',{class:'author-name',text:a.name}));
      hLeft.appendChild(el('div',{class:'author-ctx',text:a.ctx}));
      hdr.appendChild(hLeft);
      hdr.appendChild(el('i',{class:'ti '+(state.openAuthor===i?'ti-chevron-up':'ti-chevron-down'),style:'color:var(--text-muted)','aria-hidden':'true'}));
      card.appendChild(hdr);
      if(state.openAuthor===i){
        const body=el('div',{class:'author-body'});
        const ul=el('ul',{class:'ideas-list'});
        a.ideas.forEach(idea=>ul.appendChild(el('li',{text:idea})));
        body.appendChild(ul);
        if(a.works&&a.works!=='—'){
          const wp=el('div',{class:'works-pill'});
          wp.style.background=c+'18';
          wp.style.color=c;
          wp.innerHTML='<strong>Opere:</strong> '+a.works;
          body.appendChild(wp);
        }
        card.appendChild(body);
      }
      content.appendChild(card);
    });
  }

  if(u.concepts.length>0){
    content.appendChild(el('div',{class:'section-label',text:'Concetti chiave'}));
    u.concepts.forEach(cp=>{
      const cc=el('div',{class:'concept-card'});
      const t=el('div',{class:'concept-term',text:cp.t});
      t.style.color=c;
      cc.appendChild(t);
      cc.appendChild(el('div',{class:'concept-def',text:cp.d}));
      content.appendChild(cc);
    });
  }
}

function renderFlashcard(u,content,c){
  const cards=u.flashcards;
  if(!cards.length){content.appendChild(el('div',{class:'intro-text',text:'Nessun flashcard per questa UdA.'}));return;}
  const card=cards[state.cardIdx];
  const pct=Math.round(((state.cardIdx)/cards.length)*100);

  const wrap=el('div',{class:'fc-wrap'});
  const ctr=el('div',{class:'fc-counter',text:(state.cardIdx+1)+' / '+cards.length});
  wrap.appendChild(ctr);

  const pb=el('div',{class:'progress-bar',style:'width:100%'});
  const pf=el('div',{class:'progress-fill',style:'width:'+pct+'%;background:'+c});
  pb.appendChild(pf);
  wrap.appendChild(pb);

  const fc=el('div',{class:'fc-card'});
  if(state.flipped){fc.style.background='var(--surface-2)';fc.style.borderColor=c;}
  const inner=el('div',{});
  const hint=el('div',{class:'fc-hint',text:state.flipped?'↩ Risposta':'Domanda — clicca per girare'});
  hint.style.color=state.flipped?c:'var(--text-muted)';
  inner.appendChild(hint);
  inner.appendChild(el('div',{class:'fc-text',text:state.flipped?card.b:card.f}));
  fc.appendChild(inner);
  fc.onclick=()=>setState({...state,flipped:!state.flipped});
  wrap.appendChild(fc);

  const nav=el('div',{class:'fc-nav'});
  const prev=el('button',{text:'← Prec'});
  prev.onclick=()=>{if(state.cardIdx>0)setState({...state,cardIdx:state.cardIdx-1,flipped:false});};
  prev.disabled=state.cardIdx===0;
  const next=el('button',{text:'Succ →'});
  next.onclick=()=>{if(state.cardIdx<cards.length-1)setState({...state,cardIdx:state.cardIdx+1,flipped:false});};
  next.disabled=state.cardIdx===cards.length-1;
  nav.appendChild(prev);nav.appendChild(next);
  wrap.appendChild(nav);

  if(state.flipped){
    const acts=el('div',{class:'fc-actions'});
    const knew=el('button',{class:'btn-knew',text:'✓ Lo sapevo'});
    const rev=el('button',{class:'btn-review',text:'✗ Da rivedere'});
    const advance=()=>{
      if(state.cardIdx<cards.length-1)setState({...state,cardIdx:state.cardIdx+1,flipped:false});
      else setState({...state,flipped:false});
    };
    knew.onclick=advance;rev.onclick=advance;
    acts.appendChild(knew);acts.appendChild(rev);
    wrap.appendChild(acts);
  }
  content.appendChild(wrap);
}

function renderQuiz(u,content,c){
  const qs=u.quiz;
  if(!qs.length){content.appendChild(el('div',{class:'intro-text',text:'Nessuna domanda per questa UdA.'}));return;}

  if(state.done){
    const pct=Math.round((state.score/qs.length)*100);
    const dc=el('div',{class:'done-card'});
    const ds=el('div',{class:'done-score',text:pct+'%'});
    ds.style.color=c;
    dc.appendChild(ds);
    dc.appendChild(el('div',{class:'done-label',text:state.score+' / '+qs.length+' risposte corrette'}));
    const msg=pct>=80?'Ottimo! Sei pronto/a per la maturità.':pct>=60?'Bene! Ripassare i punti deboli.':'Rileggi la UdA e riprova.';
    dc.appendChild(el('div',{class:'done-msg',text:msg}));
    const rb=el('button',{class:'retry-btn',text:'Riprova'});
    rb.onclick=()=>setState({...state,quizIdx:0,selected:null,answered:false,score:0,done:false});
    dc.appendChild(rb);
    content.appendChild(dc);
    return;
  }

  const q=qs[state.quizIdx];
  const pct=Math.round((state.quizIdx/qs.length)*100);

  const pb=el('div',{class:'progress-bar'});
  const pf=el('div',{class:'progress-fill',style:'width:'+pct+'%;background:'+c});
  pb.appendChild(pf);content.appendChild(pb);

  const meta=el('div',{class:'quiz-meta'});
  meta.appendChild(el('span',{text:'Domanda '+(state.quizIdx+1)+' / '+qs.length}));
  const scoreEl=el('span',{text:'Punteggio: '+state.score});
  scoreEl.style.color=c;
  meta.appendChild(scoreEl);
  content.appendChild(meta);

  content.appendChild(el('div',{class:'quiz-q',text:q.q}));

  q.opts.forEach((opt,i)=>{
    const div=el('div',{class:'opt'});
    if(state.answered){
      if(i===q.a)div.classList.add('correct');
      else if(i===state.selected&&i!==q.a)div.classList.add('wrong');
    }
    const letter=el('span',{class:'opt-letter',text:String.fromCharCode(65+i)+'.'});
    if(!state.answered)letter.style.color=c;
    div.appendChild(letter);
    div.appendChild(el('span',{text:opt}));
    if(state.answered&&i===q.a)div.appendChild(el('span',{text:' ✓',style:'margin-left:4px'}));
    if(state.answered&&i===state.selected&&i!==q.a)div.appendChild(el('span',{text:' ✗',style:'margin-left:4px'}));
    if(!state.answered){
      div.onclick=()=>{
        const correct=i===q.a;
        setState({...state,selected:i,answered:true,score:state.score+(correct?1:0)});
      };
    }
    content.appendChild(div);
  });

  if(state.answered){
    const nb=el('button',{class:'next-btn',text:state.quizIdx<qs.length-1?'Prossima domanda →':'Vedi risultato →'});
    nb.onclick=()=>{
      if(state.quizIdx<qs.length-1)setState({...state,quizIdx:state.quizIdx+1,selected:null,answered:false});
      else setState({...state,done:true});
    };
    content.appendChild(nb);
  }
}

function el(tag,props={}){
  const e=document.createElement(tag);
  if(props.class)e.className=props.class;
  if(props.text)e.textContent=props.text;
  if(props.style)e.setAttribute('style',props.style);
  if(props['aria-hidden'])e.setAttribute('aria-hidden',props['aria-hidden']);
  if(props.disabled)e.disabled=true;
  Object.keys(props).forEach(k=>{
    if(!['class','text','style','aria-hidden','disabled'].includes(k))
      try{e[k]=props[k];}catch(err){}
  });
  return e;
}

render();
</script>
