<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdTech Hub: Hub di Ripasso Esame di Stato 2026</title>
    <style>
        /* --- CONFIGURAZIONE VARIABILI E PALETTE (LIGHT/DARK) --- */
        :root {
            --bg-app: #fcfbf9;
            --bg-sidebar: #0f172a;
            --sidebar-text: #94a3b8;
            --sidebar-text-active: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --accent-tech: #0d9488;
            --accent-tech-hover: #0f766e;
            --accent-lit: #78350f;
            --border-color: #cbd5e1;
            --code-bg: #1e293b;
            --code-text: #38bdf8;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        [data-theme="dark"] {
            --bg-app: #0f172a;
            --bg-sidebar: #020617;
            --sidebar-text: #64748b;
            --sidebar-text-active: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
            --accent-tech: #2dd4bf;
            --accent-tech-hover: #14b8a6;
            --accent-lit: #fbbf24;
            --border-color: #334155;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5);
        }

        /* --- RESET E LAYOUT STRUTTURALE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SIDEBAR FISSA (FLEXBOX/GRID) --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-brand {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--accent-tech);
            padding-bottom: 10px;
        }

        .macro-section {
            margin-bottom: 20px;
        }

        .macro-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-tech);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            margin-bottom: 5px;
        }

        .menu-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            color: var(--sidebar-text);
            text-decoration: none;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .menu-link:hover, .menu-link.active {
            background-color: rgba(13, 148, 136, 0.15);
            color: var(--sidebar-text-active);
            font-weight: 600;
        }

        /* --- AREA CONTENUTO PRINCIPALE --- */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 40px;
            max-width: 1200px;
            width: calc(100% - 280px);
        }

        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        /* --- INTERRUTTORE TEMA (TOGGLE) --- */
        .theme-toggle {
            background: none;
            border: 2px solid var(--accent-tech);
            color: var(--accent-tech);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .theme-toggle:hover {
            background-color: var(--accent-tech);
            color: #ffffff;
        }

        /* --- STRUTTURA DELLE UDA (CONTENT CARDS) --- */
        .uda-panel {
            display: none;
        }

        .uda-panel.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .uda-header {
            margin-bottom: 25px;
        }

        .uda-title {
            font-size: 1.8rem;
            color: var(--text-main);
            font-weight: 800;
            margin-bottom: 10px;
        }

        /* --- TRACKING COMPLETAMENTO --- */
        .completion-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: var(--card-bg);
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            width: fit-content;
            border: 1px solid var(--border-color);
        }

        .completion-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-tech);
        }

        /* --- INTERFACCIA FLASHCARD / QUICK QUIZ --- */
        .quiz-container {
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.1), rgba(15, 23, 42, 0.05));
            border: 1px dashed var(--accent-tech);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .quiz-btn {
            background-color: var(--accent-tech);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .quiz-btn:hover {
            background-color: var(--accent-tech-hover);
        }

        .quiz-box {
            margin-top: 10px;
            display: none;
        }

        .quiz-question {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .answer-btn {
            background-color: transparent;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .quiz-answer {
            margin-top: 10px;
            padding: 10px;
            background-color: var(--card-bg);
            border-left: 4px solid var(--accent-tech);
            display: none;
            font-style: italic;
        }

        /* --- ACCORDION SYSTEM (FISARMONICA DISCIPLINE) --- */
        .accordion-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .accordion-header {
            padding: 18px 24px;
            background-color: var(--card-bg);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .accordion-header.tech { border-left: 6px solid var(--accent-tech); color: var(--accent-tech); }
        .accordion-header.lit { border-left: 6px solid var(--accent-lit); color: var(--accent-lit); }
        .accordion-header.eng { border-left: 6px solid #2563eb; color: #2563eb; }

        .accordion-content {
            padding: 0 24px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }

        .accordion-item.open .accordion-content {
            padding: 24px;
            max-height: 2000px; /* Altezza massima sufficiente per contenere il testo esteso */
            overflow-y: auto;
        }

        /* --- REGOLE TIPOGRAFICHE ENTRO I CONTENUTI --- */
        .content-block p {
            margin-bottom: 15px;
            line-height: 1.7;
            text-align: justify;
        }

        .content-block ul, .content-block ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .content-block li {
            margin-bottom: 6px;
        }

        .literary-text {
            font-family: Georgia, serif;
            font-style: italic;
            background-color: rgba(120, 53, 15, 0.05);
            padding: 15px;
            border-radius: 6px;
            border-dash: 1px solid var(--accent-lit);
            margin: 15px 0;
        }

        /* --- TABELLE E BLOCCHI DI CODICE --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
            font-size: 0.95rem;
        }

        th {
            background-color: var(--bg-sidebar);
            color: #ffffff;
        }

        tr:nth-child(even) {
            background-color: rgba(0,0,0,0.02);
        }

        pre {
            background-color: var(--code-bg);
            color: var(--code-text);
            font-family: "Consolas", "Courier New", monospace;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 15px 0;
            font-size: 0.9rem;
            border-left: 4px solid var(--accent-tech);
        }

        code {
            font-family: "Consolas", "Courier New", monospace;
            background-color: rgba(13, 148, 136, 0.1);
            color: var(--accent-tech);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 992px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; position: relative; height: auto; border-right: none; border-bottom: 1px solid var(--border-color); }
            .main-content { margin-left: 0; width: 100%; padding: 20px; }
        }
    </style>
</head>

    <script>
        // --- DATASET COMPLETO DEL PROGRAMMA INTEGRATO (9 UdA) ---
        const programmaData = [
            {
                id: 1,

                quiz: [
                    { q: "Qual è la differenza fondamentale tra TCP e UDP?", a: "TCP è orientato alla connessione e garantisce la consegna affidabile e ordinata dei pacchetti tramite riscontri (ACK). UDP è privo di connessione, non affidabile, ma ottimizzato per la massima velocità senza overhead." },
                    { q: "Quali sono le quattro fasi sequenziali del protocollo DHCP?", a: "La sequenza DORA: Discover (broadcast del client), Offer (proposta del server), Request (richiesta del client), Acknowledge (conferma del server)." }
                ],
                informatica: `
                    <h3>Infrastruttura e Livelli Protocollari</h3>
                    <p>L'architettura di rete si fonda sulla scomposizione a livelli. Il modello <b>ISO/OSI</b> (7 livelli teorici) e lo stack <b>TCP/IP</b> (4 livelli pratici applicati) astraggono le operazioni di rete.</p>
                    <table>
                        <thead>
                            <tr><th>Livello TCP/IP</th><th>PDU</th><th>Funzioni Chiave & Protocolli</th></tr>
                        </thead>
                        <tbody>
                            <tr><td>Applicazione</td><td>Dati</td><td>Interfaccia utente (HTTP, DNS, DHCP)</td></tr>
                            <tr><td>Trasporto</td><td>Segmento</td><td>Process-to-process multiplexing (TCP, UDP). Gestione Porte e Socket.</td></tr>
                            <tr><td>Internet</td><td>Pacchetto</td><td>Indirizzamento logico e routing (IP, ICMP)</td></tr>
                            <tr><td>Accesso alla Rete</td><td>Frame/Bit</td><td>Indirizzamento fisico MAC ed emissione fisica sul mezzo</td></tr>
                        </tbody>
                    </table>
                    <h3>NAT e PAT (Network/Port Address Translation)</h3>
                    <p>Tecniche utilizzate per mappare indirizzi IP privati (non instradabili definiti dalla RFC 1918) in indirizzi pubblici globali sul router di frontiera, ovviando all'esaurimento dello spazio IPv4.</p>
                `,
                italiano: `
                    <h3>Italo Calvino: La Rete Combinatoria della Realtà</h3>
                    <p>Nelle opere di <b>Italo Calvino</b> come <i>Le città invisibili</i> (1972), lo spazio urbano si trasforma in una complessa struttura a nodi e flussi informativi. Calvino decostruisce la realtà geometricamente, interpretando il mondo come una grande architettura di rete in cui le relazioni umane e i destini si incrociano secondo precisi schemi logico-combinatori.</p>
                `,
                inglese: `
                    <h3>Technical English: Core Networking Vocabulary</h3>
                    <ul>
                        <li><b>Socket:</b> The logical endpoint of a network bidirectional communication link, uniquely defined by combining an <code>IP Address</code> and a <code>Port Number</code>.</li>

                    </ul>

            {

                ],
                informatica: `
                    <h3>Architetture Software dell'Application Layer</h3>
                    <p>I servizi software si dividono in due paradigmi principali: <b>Client-Server</b> (architettura asimmetrica centralizzata con server sempre in ascolto) e <b>Peer-to-Peer (P2P)</b> (nodi paritetici che agiscono simultaneamente da client e server).</p>
                    <h3>Analisi dei Protocolli Applicativi</h3>
                    <ul>
                        <li><b>FTP (File Transfer Protocol):</b> Utilizza la porta 21 per i comandi e la porta 20 per il trasferimento dati (in modalità attiva o passiva).</li>
                        <li><b>HTTP/HTTPS:</b> Modello stateless di richiesta/risposta. HTTPS incapsula la transazione dentro il protocollo crittografico TLS per garantire autenticazione e confidenzialità.</li>
                        <li><b>Posta Elettronica:</b> SMTP (porta 25/587) per l'invio tra server (MTA). POP3 (porta 110, scarica localmente eliminando dal server) o IMAP4 (porta 143, mantiene i messaggi centralizzati e sincronizzati) per il recupero da client (MUA).</li>
                        <li><b>IoT ed MQTT:</b> Protocollo di messaggistica ultraleggero basato sul pattern <i>Publish/Subscribe</i> mediato da un Broker centrale, ideale per l'Internet of Things.</li>
                    </ul>
                `,
                italiano: `
                    <h3>Luigi Pirandello: L'Alienazione Tecnologica e il Ruolo della Macchina</h3>
                    <p>Nel romanzo <i>I quaderni di Serafino Gubbio operatore</i> (1925), Pirandello affronta criticamente l'automazione dei servizi e la meccanizzazione industriale. Serafino, ridotto ad essere una "mano che gira la manovella" di una cinepresa, sperimenta l'annullamento della spontaneità vitale. L'interfaccia tecnologica standardizza e aliena l'esperienza umana, riducendola a pura esecuzione procedurale.</p>
                `,
                inglese: `
                    <h3>The Technological Shift in English Literature</h3>
                    <p>The transition from manual systems to global technological frameworks is reflected in 20th-century literature. As automated application layers abstract raw computation, modern authors critique how technological dependence reshapes human interactions and language, transforming direct organic communication into mechanical transactions.</p>
                `

            {

                ],
                informatica: `
                    <h3>Tecnologie di Livello 2 e Layer 3 Switching</h3>
                    <p>Gli Switch managed di Livello 2 commutano i frame ispezionando la loro <i>MAC Address Table</i>. I moderni <b>Layer 3 Switch</b> combinano la velocità hardware ASIC degli switch L2 con le capacità di instradamento IP proprie dei router.</p>
                    <h3>Architettura delle VLAN e Standard di Tagging 802.1Q</h3>
                    <p>Una <b>VLAN</b> segmenta logicamente i domini di broadcast su una infrastruttura fisica comune, aumentando la sicurezza. Le porte si configurano in:</p>
                    <ul>
                        <li><b>Access Mode:</b> Collegamento di end-device. I frame transitano privi di modifiche strutturali.</li>

                    </ul>
                `,
                italiano: `
                    <h3>Pirandello: La Frammentazione dell'Io e la Scomposizione in Maschere</h3>
                    <p>Il concetto ingegneristico di segmentazione logica delle VLAN trova un'analogia filosofica nel relativismo psicologico di Pirandello (<i>Uno, nessuno e centomila</i>). L'Io non è un dominio di broadcast monolitico, ma viene segmentato in molteplici <b>maschere</b> (sotto-interfacce) per adattarsi ai differenti contesti sociali, isolando flussi relazionali differenti e determinando l'incomunicabilità fondamentale dell'individuo.</p>

                    <h3>The Modernist Revolution: Fragmented Narratives</h3>

                ],
                informatica: `
                    <h3>I Requisiti della Sicurezza Informativa: CIA Triad</h3>
                    <p>I cardini della sicurezza delle reti sono la <b>Riservatezza (Confidentiality)</b>, l'<b>Integrità (Integrity)</b> e la <b>Disponibilità (Availability)</b>, a cui si sommano autenticazione e non ripudio.</p>
                    <h3>Sistemi Crittografici Simmetrici e Asimmetrici</h3>
                    <ul>
                        <li><b>Simmetrici:</b> Chiave condivisa segreta unica. Algoritmi rapidi come <b>AES</b> (sicuro) o <b>DES/3DES</b> (obsoleti/pesanti).</li>
                        <li><b>Asimmetrici:</b> Coppia di chiavi (Pubblica per cifrare, Privata per decifrare). Algoritmo di riferimento: <b>RSA</b>.</li>
                        <li><b>Crittografia Ibrida:</b> Utilizza l'algoritmo di <b>Diffie-Hellman</b> per scambiare in modo sicuro una chiave di sessione simmetrica temporanea, coniugando la sicurezza dell'asimmetrico con la velocità del simmetrico.</li>

                    <h3>Firma Digitale e Certificati X.509</h3>

                `,
                italiano: `
                    <h3>Italo Svevo: La Psicoanalisi come Crittanalisi dell'Inconscio</h3>
                    <p>Ne <i>La coscienza di Zeno</i> (1923), Svevo struttura il romanzo come un ammasso di ricordi cifrati e atti mancati che nascondono le reali nevrosi di Zeno Cosini. Il percorso terapeutico guidato dal Dottor S. agisce come un processo di decodifica crittanalitica: analizzare il testo in chiaro delle memorie alterate del paziente per risalire alla chiave segreta del suo trauma rimosso.</p>
                `,
                inglese: `
                    <h3>Alan Turing: Codebreaking and the Modern Break</h3>

                    <h3>Architettura dei Firewall e Sicurezza Perimetrale</h3>

                    <h3>Zone Demilitarizzate (DMZ) e liste ACL</h3>
                    <p>La <b>DMZ</b> ospita i server pubblici isolandoli dalla LAN interna privata. Le architetture possono essere a <i>vicolo cieco</i> (Three-Legged, unico firewall a 3 schede) o a <i>cuscinetto</i> (due firewall in cascata). Le <b>ACL</b> implementano le regole di filtraggio:</p>

Router(config)# interface GigabitEthernet0/0

                    <h3>George Orwell: Dystopian Boundaries and Surveillance</h3>

            {

        // --- CORE APPLICATION ENGINE (JAVASCRIPT) ---
        document.addEventListener("DOMContentLoaded", () => {
            const sidebarMenu = document.getElementById("sidebar-menu");
            const udaContainer = document.getElementById("uda-container");
            const themeBtn = document.getElementById("theme-btn");

            // 1. Iniezione Dinamica delle Componenti nell'Infrastruttura DOM
            programmaData.forEach((uda, index) => {
                // Generazione Link in Sidebar
                const li = document.createElement("li");
                li.className = "menu-item";
                li.innerHTML = `
                    <a class="menu-link ${index === 0 ? 'active' : ''}" data-target="uda-${uda.id}">
                        <span>UdA ${uda.id}</span>
                        <span id="badge-${uda.id}" style="font-size:0.75rem; color:var(--accent-tech);"></span>
                    </a>
                `;
                sidebarMenu.appendChild(li);

                // Generazione Pannelli di Contenuto (Struttura ad Accordion per Materia)
                const panel = document.createElement("div");
                panel.className = `uda-panel ${index === 0 ? 'active' : ''}`;
                panel.id = `uda-${uda.id}`;
                panel.innerHTML = `
                    <div class="uda-header">
                        <h2 class="uda-title">${uda.titolo}</h2>
                        <div class="completion-wrapper">
                            <input type="checkbox" class="completion-checkbox" id="check-${uda.id}" data-uda="${uda.id}">
                            <label for="check-${uda.id}" style="font-size:0.9rem; font-weight:600; cursor:pointer;">Segna come completato</label>
                        </div>
                    </div>

                    <div class="quiz-container">
                        <button class="quiz-btn" data-uda="${uda.id}">Quick Quiz / Flashcard</button>
                        <div class="quiz-box" id="quiz-box-${uda.id}">
                            <p class="quiz-question" id="qq-${uda.id}"></p>
                            <button class="answer-btn" id="ans-btn-${uda.id}">Rivela Risposta</button>
                            <p class="quiz-answer" id="qa-${uda.id}"></p>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <div class="accordion-header tech">Sistemi e Reti / Informatica</div>
                        <div class="accordion-content content-block">${uda.informatica}</div>
                    </div>
                    <div class="accordion-item">
                        <div class="accordion-header lit">Letteratura Italiana</div>
                        <div class="accordion-content content-block">${uda.italiano}</div>
                    </div>
                    <div class="accordion-item">
                        <div class="accordion-header eng">Lingua Inglese (CLIL)</div>
                        <div class="accordion-content content-block">${uda.inglese}</div>
                    </div>
                `;
                udaContainer.appendChild(panel);
            });

            // 2. Gestione Logica del Sistema a Tab tramite Sidebar
            const links = document.querySelectorAll(".menu-link");
            const panels = document.querySelectorAll(".uda-panel");

            links.forEach(link => {
                link.addEventListener("click", (e) => {
                    e.preventDefault();
                    links.forEach(l => l.classList.remove("active"));
                    panels.forEach(p => p.classList.remove("active"));

                    link.classList.add("active");
                    const target = link.getAttribute("data-target");
                    document.getElementById(target).classList.add("active");
                });
            });

            // 3. Gestione Logica dell'Accordion Interno alle UdA
            const accordionHeaders = document.querySelectorAll(".accordion-header");
            accordionHeaders.forEach(header => {
                header.addEventListener("click", () => {
                    const item = header.parentElement;
                    item.classList.toggle("open");
                });
            });

            // 4. Motore dei Quiz/Flashcard Casuali per Ciascuna Sezione
            const quizBtns = document.querySelectorAll(".quiz-btn");
            quizBtns.forEach(btn => {
                btn.addEventListener("click", () => {
                    const udaId = btn.getAttribute("data-uda");
                    const udaObj = programmaData.find(u => u.id == udaId);
                    const randomQuiz = udaObj.quiz[Math.floor(Math.random() * udaObj.quiz.length)];

                    const qBox = document.getElementById(`quiz-box-${udaId}`);
                    const qText = document.getElementById(`qq-${udaId}`);
                    const aText = document.getElementById(`qa-${udaId}`);
                    const ansBtn = document.getElementById(`ans-btn-${udaId}`);

                    qText.textContent = randomQuiz.q;
                    aText.textContent = randomQuiz.a;
                    aText.style.display = "none";
                    qBox.style.display = "block";

                    ansBtn.onclick = () => {
                        aText.style.display = aText.style.display === "none" ? "block" : "none";
                    };
                });
            });

            // 5. Persistenza dei Dati via LocalStorage (Checkboxes)
            const checkboxes = document.querySelectorAll(".completion-checkbox");
            
            const updateBadge = (id, isChecked) => {
                const badge = document.getElementById(`badge-${id}`);
                badge.textContent = isChecked ? "✓ Completato" : "";
            };

            checkboxes.forEach(cb => {
                const id = cb.getAttribute("data-uda");
                // Caricamento dello stato salvato
                const savedState = localStorage.getItem(`uda-completed-${id}`);
                if (savedState === "true") {
                    cb.checked = true;
                    updateBadge(id, true);
                }

                // Event Listener al cambio di stato
                cb.addEventListener("change", () => {
                    localStorage.setItem(`uda-completed-${id}`, cb.checked);
                    updateBadge(id, cb.checked);
                });
            });

            // 6. Logica di Toggle nativo Dark Mode / Light Mode
            const body = document.body;
            const savedTheme = localStorage.getItem("app-theme") || "light";
            body.setAttribute("data-theme", savedTheme);

            themeBtn.addEventListener("click", () => {
                const currentTheme = body.getAttribute("data-theme");
                const newTheme = currentTheme === "light" ? "dark" : "light";
                body.setAttribute("data-theme", newTheme);
                localStorage.setItem("app-theme", newTheme);
            });
        });
